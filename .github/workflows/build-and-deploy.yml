# .github/workflows/build-and-deploy.yml
#
# Converts bible JSON → HTML and publishes to GitHub Pages.
# Triggers on push to main (when bible/ data or the build script change).

name: Build Bible HTML, XLSX & Deploy Pages

on:
  repository_dispatch:
    types: [data-updated]
  push:
    branches: [master]
    paths:
      - 'bible/**/*.json'
      - 'ci/5HTML_render_OT.ipynb'
      - 'ci/7excel_import_export.ipynb'
      - '6HTML_render_OT.ipynb'
      - '7excel_import_export.ipynb'
  workflow_dispatch:  # manual trigger button in GitHub UI

# Sets permissions for GITHUB_TOKEN to allow Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: grauziitisos/ot-west-len-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data
          lfs: true
          
      - name: Debug - check index.html generator batch file present
        run: |
          ls -hall ci/u 
          
      - name: Debug - check CSV headers biblehub_hb_en_direct
        run: |
          head -1 data/biblehub_hb_en_direct.csv  
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jupyter nbconvert pandas openpyxl tqdm

      - name: Build HTML
        run: jupyter execute ci/5HTML_render_OT.ipynb --timeout=111337
      
      - name: Generate Index
        run: |
          cd html
          bash ../ci/u
      # If you have audio files or other static assets, copy them too:
      # - name: Copy static assets
      #   run: |
      #     cp -r strongs_p_g html/ 2>/dev/null || true
      - name: Build XLSX
        run: jupyter execute ci/7excel_import_export.ipynb --timeout=111337
        
      - name: Zip excel folder
        run: cd excel && zip -qr ../excel/excel.zip .
        
      - name: Zip html folder
        run: cd html && zip -qr ../html/bibele_e.zip .
        
      - name: Prepare deploy folder
        run: |
          mkdir -p _site
          cp -r html/* _site/
          cp -r excel _site/excel

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site


  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
