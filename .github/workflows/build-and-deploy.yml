# .github/workflows/build-and-deploy.yml
name: Build Bible HTML, XLSX & Deploy Pages

on:
  repository_dispatch:
    types: [data-updated]
  push:
    branches: [master]
    paths:
      - 'bible/**/*.json'
      - 'ci/5HTML_render_OT.ipynb'
      - 'ci/7excel_import_export.ipynb'
      - '6HTML_render_OT.ipynb'
      - '7excel_import_export.ipynb'
  workflow_dispatch: #other than those -> manual

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time (across all jobs)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # --- JOB 1: HTML Generation (runs in parallel with XLSX) ---
  build-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: grauziitisos/ot-west-len-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data
          lfs: true
          
      - name: Download NT and extract
        run: |
          mkdir -p nt
          cd nt
          curl -OL https://github.com/ewilpeers/new-testament/releases/download/gh-pages/artifact.tar.gz
          tar xzf artifact.tar.gz
          rm artifact.tar.gz
          cd ..

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jupyter nbconvert pandas openpyxl tqdm

      - name: Build HTML
        run: jupyter execute ci/5HTML_render_OT.ipynb --timeout=111337

      - name: Generate Index
        run: |
          cd html
          bash ../ci/u
          cd ..
          bash ci/u_comm

      # Package HTML folder + root index.html into a single artifact
      - name: Package HTML output
        run: zip -r html-full.zip html/ nt/ index.html

      - name: Upload HTML artifact
        uses: actions/upload-artifact@v4
        with:
          name: html-artifact
          path: html-full.zip

  # --- JOB 2: XLSX Generation (runs in parallel with HTML) ---
  build-xlsx:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          repository: grauziitisos/ot-west-len-data
          token: ${{ secrets.DATA_REPO_PAT }}
          path: data
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install jupyter nbconvert pandas openpyxl tqdm

      - name: Build XLSX
        run: jupyter execute ci/7excel_import_export.ipynb --timeout=111337

      - name: Package XLSX output
        run: zip -r excel.zip excel/

      - name: Upload XLSX artifact
        uses: actions/upload-artifact@v4
        with:
          name: excel-artifact
          path: excel.zip

  # --- JOB 3: Assemble & Deploy (runs ONLY after BOTH finish) ---
  assemble:
    runs-on: ubuntu-latest
    needs: [build-html, build-xlsx]  # <-- This is the magic line for parallelism
    steps:
      - name: Checkout repo (to get fonts and NT download script)
        uses: actions/checkout@v4

      - name: Download HTML artifact
        uses: actions/download-artifact@v4
        with:
          name: html-artifact

      - name: Download XLSX artifact
        uses: actions/download-artifact@v4
        with:
          name: excel-artifact

      - name: Prepare deploy folder (_site)
        run: |
          # Unpack artifacts
          unzip -q html-full.zip -d html_extracted
          unzip -q excel.zip -d excel_extracted
          rm *.zip
          
          # Create final structure
          mkdir -p _site/e _site/g

          # Move root index.html (generated by the HTML job)
          mv html_extracted/index.html _site/
          
          # Move NT files
          mv html_extracted/nt/* _site/g/
          # Move OT files
          mv html_extracted/html/* _site/e/

          # Move Excel folder (the excel/ folder itself goes inside /e/)
          mv excel_extracted/excel _site/e/

          # Copy fonts to BOTH locations
          cp -r bible/fonts _site/e/
          mv bible/fonts _site/g/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: assemble
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
